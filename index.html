<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queen Ishita's Grand Celebration</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --royal-gold: #D4AF37;
            --deep-rose: #880e4f;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #fff5f7;
            overflow: hidden;
            height: 100vh;
            cursor: crosshair;
        }

        /* Royal Floral Frame System */
        .page-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 20px solid transparent;
            pointer-events: none;
            z-index: 100;
            box-sizing: border-box;
            transition: border-image 0.8s ease;
        }

        /* Different Flowers for each page */
        #page1 .page-frame { border-image: url('https://www.transparentpng.com/download/floral/pink-flowers-frame-png-21.png') 100 round; }
        #page2 .page-frame { border-image: url('https://www.transparentpng.com/download/floral/red-roses-frame-free-png-17.png') 100 round; }
        #page3 .page-frame { border-image: url('https://www.transparentpng.com/download/floral/gold-floral-frame-png-15.png') 100 round; }
        #page4 .page-frame { border-image: url('https://www.transparentpng.com/download/floral/purple-flowers-frame-png-12.png') 100 round; }
        #page5 .page-frame { border-image: url('https://www.transparentpng.com/download/floral/pink-flowers-frame-png-21.png') 100 round; }
        #page6 .page-frame { border-image: url('https://www.transparentpng.com/download/floral/gold-floral-frame-png-15.png') 100 round; }

        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--deep-rose); clip-path: circle(0% at 50% 50%);
            z-index: 999; display: flex; justify-content: center; align-items: center;
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10; padding: 40px; box-sizing: border-box;
        }
        .active { display: flex; }

        h1, .cursive { font-family: 'Great Vibes', cursive; color: var(--deep-rose); }

        /* The Grand Dessert Table */
        .dessert-table { display: flex; align-items: flex-end; gap: 20px; }
        .main-cake { font-size: 150px; position: relative; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)); }
        .mini-cake { font-size: 60px; filter: grayscale(20%); }
        .heart-candle {
            position: absolute; top: -50px; font-size: 40px;
            animation: flicker 0.2s infinite alternate;
        }
        @keyframes flicker { from { transform: scale(1); opacity: 1; } to { transform: scale(1.1); opacity: 0.8; } }

        /* Realistic Heart Balloons */
        .heart-balloon {
            position: relative; width: 70px; height: 65px; cursor: pointer;
            filter: drop-shadow(0 8px 15px rgba(255, 77, 109, 0.5));
            transition: 0.4s;
        }
        .heart-balloon::before, .heart-balloon::after {
            content: ""; position: absolute; top: 0; width: 35px; height: 60px;
            background: linear-gradient(145deg, #ff758c 0%, #ff4d6d 100%);
            border-radius: 40px 40px 0 0;
        }
        .heart-balloon::before { left: 35px; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart-balloon::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

        .royal-card {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 30px; border: 2px solid var(--royal-gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 500px;
        }

        button {
            background: linear-gradient(to right, #880e4f, #d81b60);
            color: white; border: none; padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-top: 20px; transition: 0.3s;
        }
        button:hover { transform: translateY(-5px) scale(1.05); }

        .popped { transform: scale(0); opacity: 0; pointer-events: none; }
        .hidden { display: none !important; }

        /* Emoji Rockets */
        .rocket-emoji {
            position: fixed; bottom: 0; font-size: 40px;
            pointer-events: none; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="transition-overlay"><span style="font-size: 100px; color: white;">❤️</span></div>

    <div id="page1" class="page active">
        <div class="page-frame"></div>
        <h1 style="font-size: 5rem;">Ishita</h1>
        <div style="font-size: 60px; animation: float 3s infinite;">✨💎✨</div>
        <div style="width: 250px; height: 8px; background: #eee; border-radius: 10px; margin: 20px;">
            <div id="bar" style="width:0%; height:100%; background:var(--royal-gold); transition: 0.1s;"></div>
        </div>
        <p class="cursive" style="font-size: 2rem;">A royal celebration is loading...</p>
    </div>

    <div id="page2" class="page">
        <div class="page-frame"></div>
        <div class="royal-card">
            <h1 style="font-size: 3rem;">A Cutie was born...</h1>
            <p style="font-size: 1.2rem;">Exactly 17 years ago, the stars aligned for you.</p>
            <button onclick="changePage(3)">Enter the Palace ✨</button>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="page-frame"></div>
        <h1 style="font-size: 3.5rem;">Make a Wish, Queen</h1>
        <div class="dessert-table">
            <div class="mini-cake">🧁</div>
